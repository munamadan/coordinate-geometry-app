<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coordinate Geometry Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="flashOverlay" class="flash-overlay"></div>

    <header class="px-6 py-4">
        <div class="flex items-center justify-between max-w-[1800px] mx-auto">
            <h1 class="font-display text-2xl font-bold tracking-tight">
                <span class="text-cyan-400">Coord</span><span class="text-lime-400">Geometry</span>
                <span class="text-zinc-600 text-lg ml-2 font-normal">Explorer</span>
            </h1>
            <nav class="flex gap-1">
                <button class="nav-tab active relative px-5 py-2 rounded-lg font-medium text-sm" data-module="line-builder">Line Builder</button>
                <button class="nav-tab relative px-5 py-2 rounded-lg font-medium text-sm" data-module="slope-racer">Slope Racer</button>
                <button class="nav-tab relative px-5 py-2 rounded-lg font-medium text-sm" data-module="shape-explorer">Shape Explorer</button>
                <button class="nav-tab relative px-5 py-2 rounded-lg font-medium text-sm" data-module="what-changed">What Changed?</button>
            </nav>
        </div>
    </header>

    <div class="flex h-[calc(100vh-73px)]">
        <aside id="sidebar" class="w-80 p-5 overflow-y-auto"></aside>
        <main class="flex-1 flex items-center justify-center p-8">
            <canvas id="canvas"></canvas>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
